name: Build and Deploy AI-Cut Pro

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/ai-cut-pro:latest
          ghcr.io/${{ github.repository_owner }}/ai-cut-pro:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # -------------------------------------------------------------------------
    # 🚀 Google Cloud Run へのデプロイ
    # -------------------------------------------------------------------------
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ai-cut-pro
        image: ghcr.io/${{ github.repository_owner }}/ai-cut-pro:latest
        region: asia-northeast1
        # Whisperや動画処理にはメモリが必要なため、多めに設定（最低2GB、推奨4GB以上）
        flags: |
          --memory=4Gi
          --cpu=2
          --timeout=3600
          --allow-unauthenticated
